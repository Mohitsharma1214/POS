<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Podcast Pipeline Dashboard</title>
    <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
    <div class="container">
        <h1 class="title">Podcast Guest Research Dashboard</h1>
        <form id="pipelineForm" class="form">
            <input type="text" id="guestName" placeholder="Guest Name" required />
            <input type="text" id="guestNiche" placeholder="Guest Niche (optional)" />
            <input type="text" id="guestCompany" placeholder="Guest Company (optional)" />
            <button type="submit">Run Pipeline</button>
        </form>
        <div id="resultContainer" class="result hidden">
            <h2>Pipeline Execution Trace</h2>
            <pre id="traceOutput" class="trace"></pre>
        </div>
    </div>
    <script src="/static/dashboard.js"></script>
</body>
</html>
